<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Form</h2>

<form th:action="@{/employees/create}" th:object="${employee}" method="post">

  <input type="hidden" th:field="*{id}" />

  Tên: <input type="text" th:field="*{fullName}" /><br/>
  Chức vụ: <input type="text" th:field="*{position}" /><br/>
  Lương: <input type="number" step="0.1" th:field="*{salary}" /><br/>
  Ngày: <input type="text" th:field="*{hireDate}" /><br/>
  Email: <input type="text" th:field="*{email}" /><br/>

  <button type="submit">Save</button>
</form>

</body>
</html>
