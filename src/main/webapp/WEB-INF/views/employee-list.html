<form method="get" th:action="@{/employees}">
    <input type="text" name="keyword" placeholder="Tìm..." th:value="${keyword}" />
    <button type="submit">Search</button>
</form>

<a href="/employees/create">Thêm</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Tên</th>
        <th>Chức vụ</th>
        <th>Lương</th>
        <th>Ngày</th>
        <th>Email</th>
        <th>Action</th>
    </tr>

    <tr th:each="e : ${employees}">
        <td th:text="${e.id}"></td>
        <td th:text="${e.fullName}"></td>
        <td th:text="${e.position}"></td>
        <td th:text="${e.salary}"></td>
        <td th:text="${e.hireDate}"></td>
        <td th:text="${e.email}"></td>
        <td>
            <a th:href="@{/employees/edit/{id}(id=${e.id})}">Edit</a>
            <a th:href="@{/employees/delete/{id}(id=${e.id})}"
               onclick="return confirm('Xóa?')">Delete</a>
        </td>
    </tr>
</table>
