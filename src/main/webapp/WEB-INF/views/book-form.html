<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Form sách</h2>

<form th:action="@{${book.id} != null ? '/books/edit' : '/books/create'}"
      th:object="${book}" method="post">

  <input type="hidden" th:field="*{id}" />

  Tiêu đề: <input type="text" th:field="*{title}" /><br/>
  Tác giả: <input type="text" th:field="*{author}" /><br/>
  ISBN: <input type="text" th:field="*{isbn}" /><br/>
  Năm: <input type="number" th:field="*{publicationYear}" /><br/>
  Giá: <input type="number" th:field="*{price}" /><br/>

  <button type="submit">Save</button>
</form>

</body>
</html>
