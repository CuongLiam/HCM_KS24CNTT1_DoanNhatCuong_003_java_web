<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Danh sách sách</h2>

<form method="get" th:action="@{/books}">
    <input type="text" name="keyword" placeholder="Tìm..." th:value="${keyword}" />
    <button type="submit">Search</button>
</form>

<a th:href="@{/books/create}">Thêm</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Tiêu đề</th>
        <th>Tác giả</th>
        <th>ISBN</th>
        <th>Năm</th>
        <th>Giá</th>
        <th>Action</th>
    </tr>

    <tr th:if="${#lists.isEmpty(books)}">
        <td colspan="7">Chưa có sách nào</td>
    </tr>

    <tr th:each="b : ${books}">
        <td th:text="${b.id}"></td>
        <td th:text="${b.title}"></td>
        <td th:text="${b.author}"></td>
        <td th:text="${b.isbn}"></td>
        <td th:text="${b.publicationYear}"></td>
        <td th:text="${b.price}"></td>
        <td>
            <a th:href="@{/books/edit/{id}(id=${b.id})}">Edit</a>
            <a th:href="@{/books/delete/{id}(id=${b.id})}"
               onclick="return confirm('Xóa?')">Delete</a>
        </td>
    </tr>
</table>

</body>
</html>
